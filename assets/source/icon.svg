<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e40af"/>
      <stop offset="0.55" stop-color="#3b5bdb"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dbe4ff"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- "N" monogram built from network links -->
  <g stroke="#ffffff" stroke-opacity="0.9" stroke-linecap="round" fill="none" stroke-width="44">
    <line x1="312" y1="772" x2="312" y2="252"/>            <!-- left vertical -->
    <line x1="312" y1="252" x2="712" y2="772"/>            <!-- diagonal -->
    <line x1="712" y1="772" x2="712" y2="252"/>            <!-- right vertical -->
  </g>

  <!-- nodes at the junctions -->
  <g fill="url(#node)">
    <circle cx="312" cy="252" r="70"/>
    <circle cx="712" cy="772" r="70"/>
    <circle cx="312" cy="772" r="50"/>
    <circle cx="712" cy="252" r="50"/>
    <circle cx="512" cy="512" r="40"/>
  </g>
</svg>
