# Nexora Mobile — GitLab CI
#
# Required CI/CD variables (Settings → CI/CD → Variables, masked):
#   EXPO_TOKEN         — expo.dev access token (cloud builds)
#   GITLAB_PUSH_TOKEN  — project/group access token with `write_repository`
#                        scope (lets the auto-tag job push a tag back). Without
#                        it, auto-tag is skipped.
#
# Release flow (mirrors the rest of the platform):
#   1. Bump VERSION (+ app.json/package.json "version") and push to main.
#   2. `auto-tag` sees VERSION has no matching tag → creates & pushes vX.Y.Z.
#   3. The tag push triggers (a) `eas:release` (AAB) and (b) the GitLab
#      tag-push webhook → NexoraGateway publishes a ProductVersion
#      (product=nexora-mobile) → it surfaces in the NexoraWeb changelog.
#
# Configure the webhook once: GitLab → Settings → Webhooks →
#   URL https://nexora-gw.parendum.com/webhooks/gitlab/tag, Tag push events,
#   token = GITLAB_WEBHOOK_SECRET.

stages:
  - validate
  - test
  - tag
  - build

default:
  # node:22 provides the node:sqlite builtin some toolchain deps now require.
  image: node:22-bookworm
  before_script:
    - corepack enable
    - corepack prepare pnpm@11.1.1 --activate
    - pnpm config set store-dir .pnpm-store
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store

variables:
  EAS_PROFILE_ANDROID: preview      # APK, sideloadable
  EAS_PROFILE_RELEASE: production    # AAB, store-ready

# ── validate ──────────────────────────────────────────────────────────────────
typecheck:
  stage: validate
  script:
    - pnpm install --no-frozen-lockfile
    - pnpm exec tsc --noEmit
    # Keep VERSION in lockstep with the published app version.
    - |
      V=$(tr -d '[:space:]' < VERSION)
      APP=$(node -p "require('./app.json').expo.version")
      PKG=$(node -p "require('./package.json').version")
      if [ "$V" != "$APP" ] || [ "$V" != "$PKG" ]; then
        echo "Version mismatch: VERSION=$V app.json=$APP package.json=$PKG — keep them in sync."; exit 1
      fi
      echo "Version $V consistent across VERSION / app.json / package.json."
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

# ── test ────────────────────────────────────────────────────────────────────--
# Unit + component tests (jest-expo) with coverage, plus a strict type-check.
# Runs in a clean node container via pnpm/corepack (host-npm rule doesn't apply
# in CI). Coverage is parsed by GitLab from cobertura + the regex below.
test:
  stage: test
  script:
    - pnpm install --no-frozen-lockfile
    - pnpm exec tsc --noEmit
    - pnpm run test:coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d.]+)/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

# ── deadcode (report-only) ──────────────────────────────────────────────────--
# Detects unused files / exports / dependencies with knip. Non-blocking
# (allow_failure) — surfaced for cleanup, never gates a build or release.
deadcode:
  stage: test
  allow_failure: true
  script:
    - pnpm install --no-frozen-lockfile
    - pnpm run deadcode
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── auto-tag ────────────────────────────────────────────────────────────────--
# On a main push, if VERSION has no matching git tag yet, create & push it.
# Idempotent: re-running with an existing tag is a no-op. Only runs on the
# main branch (never on tag pipelines), so it can't loop.
auto-tag:
  stage: tag
  # alpine/git's ENTRYPOINT is `git`, which turns GitLab's shell script into
  # `git sh -c ...` ("sh is not a git command"). Override it so the script runs.
  image:
    name: alpine/git:latest
    entrypoint: [""]
  before_script: []
  cache: {}
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - |
      VERSION=$(tr -d '[:space:]' < VERSION)
      TAG="v$VERSION"
      if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
        echo "Tag $TAG already exists — nothing to publish."; exit 0
      fi
      if [ -z "$GITLAB_PUSH_TOKEN" ]; then
        echo "GITLAB_PUSH_TOKEN not set — skipping auto-tag (configure it as a masked CI/CD variable, project access token with write_repository, to enable release tagging)."; exit 0
      fi
      git config user.email "ci@parendum.com"
      git config user.name "Nexora CI"
      git remote set-url origin "https://oauth2:${GITLAB_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      git tag -a "$TAG" -m "Release $TAG"
      git push origin "$TAG"
      echo "Published tag $TAG — release build + version publish will follow."

# ── build ───────────────────────────────────────────────────────────────────--
.eas_base: &eas_base
  stage: build
  timeout: 1h
  before_script:
    - corepack enable
    - corepack prepare pnpm@11.1.1 --activate
    - |
      if [ -z "$EXPO_TOKEN" ]; then
        echo "EXPO_TOKEN is not set. Add it as a masked CI/CD variable (Settings → CI/CD → Variables)."
        exit 1
      fi
    - pnpm install --no-frozen-lockfile

# Auto APK build on every push to main. Only runs when EXPO_TOKEN is configured
# (cloud builds need it); otherwise the job is skipped so CI isn't blocked.
eas:android:
  <<: *eas_base
  script:
    - pnpm dlx eas-cli@latest build --platform android --profile "$EAS_PROFILE_ANDROID" --non-interactive
  rules:
    - if: '$EXPO_TOKEN && $CI_COMMIT_BRANCH == "main"'

# Production AAB on tag push (created by auto-tag or manually).
eas:release:
  <<: *eas_base
  script:
    - pnpm dlx eas-cli@latest build --platform android --profile "$EAS_PROFILE_RELEASE" --non-interactive
  rules:
    - if: '$EXPO_TOKEN && $CI_COMMIT_TAG'

# iOS is manual — first run prompts EAS to set up Apple credentials.
eas:ios:
  <<: *eas_base
  script:
    - pnpm dlx eas-cli@latest build --platform ios --profile "$EAS_PROFILE_ANDROID" --non-interactive
  rules:
    - if: '$EXPO_TOKEN && $CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true

# On tag: create a GitLab Release whose description is the matching CHANGELOG.md
# section. This fires a Release event → the Gateway backfills the changelog notes
# (the tag-push webhook alone often races ahead of the Release and gets empty notes).
release:
  stage: build
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  before_script: []
  cache: {}
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      # Extract lines under "## <version>" up to the next "## " heading.
      NOTES=$(awk -v v="$VERSION" '
        $0 ~ "^## \\[?" v "\\]?([^0-9].*)?$" {f=1; next}
        /^## / {f=0}
        f {print}
      ' CHANGELOG.md | sed '/^[[:space:]]*$/d')
      [ -z "$NOTES" ] && NOTES="Release $CI_COMMIT_TAG"
      echo "$NOTES" > release_notes.md
      echo "Release notes for $CI_COMMIT_TAG:"; cat release_notes.md
  release:
    tag_name: '$CI_COMMIT_TAG'
    name: 'Nexora Mobile $CI_COMMIT_TAG'
    description: release_notes.md
